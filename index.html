<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI用語集</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #f0f4f8;
    color: #333;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 24px 16px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
  header p { font-size: 0.78rem; opacity: 0.9; margin-bottom: 12px; }
  .search-box {
    display: flex;
    gap: 8px;
    max-width: 500px;
    margin: 0 auto;
  }
  .search-box input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 24px;
    border: none;
    font-size: 1rem;
    outline: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .search-box button {
    background: white;
    color: #667eea;
    border: none;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  .stats {
    text-align: center;
    font-size: 0.78rem;
    color: #888;
    padding: 8px;
    background: white;
    border-bottom: 1px solid #e8e8e8;
  }
  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 0;
    background: white;
    border-bottom: 2px solid #e8e8e8;
    padding: 0 8px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    color: #888;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: #667eea; border-bottom-color: #667eea; }
  .tab:hover { color: #667eea; }
  .content { padding: 12px; max-width: 700px; margin: 0 auto; }
  .category { margin-bottom: 16px; }
  .category-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: #667eea;
    padding: 6px 0 6px 8px;
    border-left: 4px solid #667eea;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .term-card {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-left: 4px solid #e8e8e8;
    transition: all 0.2s;
    cursor: pointer;
  }
  .term-card:hover { box-shadow: 0 2px 12px rgba(102,126,234,0.2); border-left-color: #667eea; }
  .term-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .term-name { font-size: 1rem; font-weight: 700; color: #222; }
  .term-reading { font-size: 0.75rem; color: #999; font-weight: 400; }
  .term-desc { font-size: 0.85rem; color: #555; line-height: 1.6; }
  .term-tip {
    margin-top: 6px;
    font-size: 0.78rem;
    color: #888;
    background: #f8f9ff;
    padding: 5px 9px;
    border-radius: 6px;
    display: flex;
    gap: 5px;
  }
  .no-result {
    text-align: center;
    padding: 48px 16px;
    color: #aaa;
  }
  .no-result .icon { font-size: 3rem; margin-bottom: 12px; }
  mark { background: #fff176; border-radius: 3px; padding: 0 2px; }
  .loading {
    text-align: center;
    padding: 48px 16px;
    color: #aaa;
    font-size: 1rem;
  }
  @media (max-width: 480px) {
    header h1 { font-size: 1.2rem; }
    .term-name { font-size: 0.95rem; }
    .term-desc { font-size: 0.82rem; }
  }
</style>
</head>
<body>

<header>
  <h1>📖 AI用語集</h1>
  <p>わからない言葉をすぐ調べられます</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="例：トークン、GitHub、API…" oninput="search()">
    <button onclick="clearSearch()">クリア</button>
  </div>
</header>

<div class="stats" id="stats">読み込み中...</div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"><div class="loading">📖 読み込み中...</div></div>

<script>
let glossary = [];
let activeCategory = 'all';
let searchQuery = '';

async function init() {
  try {
    const res = await fetch('data.json');
    glossary = await res.json();
    renderTabs();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="no-result"><div class="icon">⚠️</div><div>データの読み込みに失敗しました</div></div>';
  }
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const allTab = `<div class="tab active" onclick="filterCategory('all')" data-cat="all">すべて</div>`;
  const catTabs = glossary.map(g =>
    `<div class="tab" onclick="filterCategory('${g.cat}')" data-cat="${g.cat}">${g.icon} ${g.cat}</div>`
  ).join('');
  tabs.innerHTML = allTab + catTabs;
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function render() {
  const content = document.getElementById('content');
  const q = searchQuery.trim().toLowerCase();
  let totalShown = 0;
  let html = '';

  for (const group of glossary) {
    if (activeCategory !== 'all' && activeCategory !== group.cat) continue;
    const filtered = group.terms.filter(t => {
      if (!q) return true;
      return (t.name + t.reading + t.desc + (t.tip || '')).toLowerCase().includes(q);
    });
    if (filtered.length === 0) continue;
    totalShown += filtered.length;
    html += `<div class="category">
      <div class="category-title">${group.icon} ${group.cat}</div>`;
    for (const t of filtered) {
      html += `<div class="term-card">
        <div class="term-header">
          <span class="term-name">${highlight(t.name, q)}</span>
          ${t.reading ? `<span class="term-reading">（${highlight(t.reading, q)}）</span>` : ''}
        </div>
        <div class="term-desc">${highlight(t.desc, q)}</div>
        ${t.tip ? `<div class="term-tip">💡 ${highlight(t.tip, q)}</div>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  if (totalShown === 0) {
    html = `<div class="no-result"><div class="icon">🔍</div><div>「${q}」は見つかりませんでした</div><div style="margin-top:8px;font-size:0.8rem">別の言葉で試してみてください</div></div>`;
  }
  content.innerHTML = html;

  const total = glossary.reduce((s, g) => s + g.terms.length, 0);
  document.getElementById('stats').innerHTML = q
    ? `「${q}」の結果：<strong>${totalShown}</strong> 語 / 全 <strong>${total}</strong> 語`
    : `全 <strong>${total}</strong> 語収録`;
}

function updateTabActive() {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === activeCategory);
  });
}

function filterCategory(cat) {
  activeCategory = cat;
  updateTabActive();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function search() {
  searchQuery = document.getElementById('searchInput').value;
  activeCategory = 'all';
  updateTabActive();
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  render();
}

init();
</script>
</body>
</html>
